<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K&M Beauty Salón - Cotizador de Uñas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --morado-royal: #6A1B9A;
            --morado-luz: #F3E5F5;
            --morado-deep: #4A148C;
            --blanco: #FFFFFF;
            --gris-ultra: #F8F9FA;
            --texto: #2D3436;
            --shadow: 0 20px 40px rgba(106, 27, 154, 0.08);
            --radios-grandes: 32px;
            --radios-medianos: 18px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--gris-ultra);
            color: var(--texto);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* --- TARJETA PRINCIPAL (Scroll Vertical Suave) --- */
        .main-card {
            background: var(--blanco);
            width: 100%;
            max-width: 550px;
            border-radius: var(--radios-grandes);
            box-shadow: var(--shadow);
            padding: 35px 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* --- HEADER --- */
        .header {
            text-align: center;
            border-bottom: 2px solid var(--morado-luz);
            padding-bottom: 15px;
        }

        .logo-container {
            width: 100%;
            max-width: 220px;
            margin: 0 auto 15px auto;
        }

        .logo {
            width: 100%;
            height: auto;
            object-fit: contain;
            border-radius: var(--radios-medianos);
        }

        .dedicatoria {
            font-size: 11px;
            color: var(--morado-royal);
            font-weight: 600;
            font-style: italic;
            margin-top: 5px;
        }

        /* --- SECCIONES INTERNAS --- */
        .section-title {
            font-size: 16px;
            color: var(--morado-deep);
            font-weight: 600;
            margin-bottom: 15px;
            border-left: 4px solid var(--morado-royal);
            padding-left: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .option-group {
            background: var(--gris-ultra);
            padding: 18px;
            border-radius: var(--radios-medianos);
            border: 1px solid #E4E7EB;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #57606F;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E4E7EB;
            border-radius: var(--radios-medianos);
            font-size: 14px;
            outline: none;
            background: #fff;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--morado-royal);
            background: var(--morado-luz);
        }

        /* --- FILAS DE ENTRADAS (Decoraciones) --- */
        .decorations-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Scrollbar personalizado para la lista de decoraciones */
        .decorations-container::-webkit-scrollbar {
            width: 6px;
        }
        .decorations-container::-webkit-scrollbar-thumb {
            background: #CED6E0;
            border-radius: 10px;
        }

        .flex-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--gris-ultra);
            border-radius: var(--radios-medianos);
            border: 1px solid #E4E7EB;
            transition: all 0.2s ease;
        }

        .flex-row:hover {
            border-color: rgba(106, 27, 154, 0.2);
            background: #fff;
        }

        .flex-row label {
            margin-bottom: 0;
            flex: 1;
            font-weight: 400;
            color: var(--texto);
            font-size: 13.5px;
        }

        .flex-row input[type="number"] {
            width: 65px;
            text-align: center;
            padding: 8px;
            border: 1.5px solid #E4E7EB;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }

        .flex-row input[type="number"]:focus {
            border-color: var(--morado-royal);
            background: var(--morado-luz);
        }

        .flex-row input[type="checkbox"] { 
            width: 22px; 
            height: 22px; 
            accent-color: var(--morado-royal);
            cursor: pointer;
        }

        /* --- CONTENEDOR FIJO DE TOTAL (STICKY EFFECT) --- */
        .total-container {
            background: var(--morado-royal);
            color: white;
            padding: 20px;
            border-radius: var(--radios-medianos);
            text-align: center;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(106, 27, 154, 0.2);
        }

        .total-container span {
            font-size: 12px;
            letter-spacing: 1px;
            opacity: 0.8;
            font-weight: 600;
        }

        .total-container h3 {
            font-size: 38px;
            font-weight: 700;
            margin-top: 2px;
        }

        .btn-reset {
            background: none;
            border: 2px solid var(--morado-royal);
            color: var(--morado-royal);
            padding: 14px;
            border-radius: var(--radios-medianos);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-reset:hover {
            background: var(--morado-luz);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <div class="logo-container">
            <img src="https://images2.imgbox.com/ca/4f/nU9QAn8O_o.jpg" alt="Logo K&M Salon" class="logo" onerror="this.onerror=null; this.src='https://placehold.co/400x150/F3E5F5/6A1B9A?text=K%26M+Salon';">
        </div>
        <p class="dedicatoria">Calculadora hecha para mi bella guapolita por su bello guapolito</p>
    </div>

    <div>
        <div class="section-title">1. Técnica Base</div>
        <div class="option-group">
            <label for="tecnica">Selecciona el servicio principal:</label>
            <select id="tecnica" onchange="calcularTotal()">
                <option value="0">-- Ninguno / Solo Decoraciones Extra --</option>
                <optgroup label="Polygel">
                    <option value="300">Polygel Largo 1 ($300)</option>
                    <option value="350">Polygel Largo 2 ($350)</option>
                    <option value="380">Polygel Largo 3 ($380)</option>
                    <option value="400">Polygel Largo 4 ($400)</option>
                    <option value="450">Polygel Largo 5 ($450)</option>
                </optgroup>
                <option value="150">Gel Semipermanente Manos ($150)</option>
                <option value="300">Rubber Gel ($300)</option>
                <option value="190">Press On ($190)</option>
            </select>
            <p style="font-size: 11px; color: #95A5A6; margin-top: 8px;">* Incluye 2 tonos lisos a elegir de base.</p>
        </div>
    </div>

    <div>
        <div class="section-title">2. Decoraciones, Efectos y Cristales</div>
        <div class="decorations-container">
            <div class="flex-row">
                <label>Espejo ($5)</label>
                <input type="number" class="calc-input" data-price="5" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Aurora ($5)</label>
                <input type="number" class="calc-input" data-price="5" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Sueter ($5)</label>
                <input type="number" class="calc-input" data-price="5" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Perla ($5)</label>
                <input type="number" class="calc-input" data-price="5" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Glitter ($5)</label>
                <input type="number" class="calc-input" data-price="5" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Blooming ($5)</label>
                <input type="number" class="calc-input" data-price="5" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Ojo de gato ($5)</label>
                <input type="number" class="calc-input" data-price="5" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Francés ($5)</label>
                <input type="number" class="calc-input" data-price="5" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Nail art simple ($5)</label>
                <input type="number" class="calc-input" data-price="5" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Sticker ($5)</label>
                <input type="number" class="calc-input" data-price="5" min="0" value="0" onchange="calcularTotal()">
            </div>

            <div class="flex-row">
                <label>3D ($10)</label>
                <input type="number" class="calc-input" data-price="10" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Encapsulado ($10)</label>
                <input type="number" class="calc-input" data-price="10" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Naturaleza muerta ($10)</label>
                <input type="number" class="calc-input" data-price="10" min="0" value="0" onchange="calcularTotal()">
            </div>

            <div class="flex-row">
                <label>Carey ($15)</label>
                <input type="number" class="calc-input" data-price="15" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Relieve ($15)</label>
                <input type="number" class="calc-input" data-price="15" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Flor 3D ($15)</label>
                <input type="number" class="calc-input" data-price="15" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Nail art complicado ($15)</label>
                <input type="number" class="calc-input" data-price="15" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Baby boomer ($15)</label>
                <input type="number" class="calc-input" data-price="15" min="0" value="0" onchange="calcularTotal()">
            </div>

            <div class="flex-row">
                <label>Piedra pequeña ($2)</label>
                <input type="number" class="calc-input" data-price="2" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Diseño de Cristales Ch ($20)</label>
                <input type="number" class="calc-input" data-price="20" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Diseño de cristales M ($30)</label>
                <input type="number" class="calc-input" data-price="30" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Diseño de cristales G ($40)</label>
                <input type="number" class="calc-input" data-price="40" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Uña completa cristal ch (Largo 1,2,3) ($50)</label>
                <input type="number" class="calc-input" data-price="50" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Uña completa cristal M ($80)</label>
                <input type="number" class="calc-input" data-price="80" min="0" value="0" onchange="calcularTotal()">
            </div>
        </div>
    </div>

    <div>
        <div class="section-title">3. Adicionales y Retiros</div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div class="flex-row">
                <label>Tonos extras ($5 c/u)</label>
                <input type="number" class="calc-input" data-price="5" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Cambio de forma ($20)</label>
                <input type="checkbox" id="forma" data-price="20" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Retiro Acrílico uña ($10)</label>
                <input type="number" class="calc-input" data-price="10" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Retiro Gel uña ($8)</label>
                <input type="number" class="calc-input" data-price="8" min="0" value="0" onchange="calcularTotal()">
            </div>
            <div class="flex-row">
                <label>Reposición Acrílico ($30)</label>
                <input type="number" class="calc-input" data-price="30" min="0" value="0" onchange="calcularTotal()">
            </div>
        </div>
    </div>

    <div class="total-container">
        <span>TOTAL ESTIMADO EN TIEMPO REAL</span>
        <h3 id="realTimeTotal">$0.00</h3>
    </div>

    <button class="btn-reset" onclick="limpiarTodo()">Limpiar Todo / Nueva Cotización</button>
</div>

<script>
function calcularTotal() {
    // 1. Obtener precio de la técnica base
    const tecnicaSelect = document.getElementById('tecnica');
    let total = parseFloat(tecnicaSelect.value) || 0;

    // 2. Sumar todos los inputs numéricos (Decoraciones, Efectos, Adicionales)
    document.querySelectorAll('.calc-input').forEach(input => {
        const cantidad = parseInt(input.value) || 0;
        const precio = parseFloat(input.dataset.price) || 0;
        total += (cantidad * precio);
    });

    // 3. Sumar el checkbox de cambio de forma
    const checkForma = document.getElementById('forma');
    if (checkForma.checked) {
        total += parseFloat(checkForma.dataset.price) || 0;
    }

    // 4. Mostrar el total con formato en pantalla
    document.getElementById('realTimeTotal').innerText = `$${total.toFixed(2)}`;
}

function limpiarTodo() {
    // Reiniciar select
    document.getElementById('tecnica').value = "0";
    
    // Reiniciar todos los inputs a cero
    document.querySelectorAll('.calc-input').forEach(input => input.value = 0);
    
    // Desmarcar checkbox
    document.getElementById('forma').checked = false;
    
    // Recalcular el total para actualizar pantalla a $0.00
    calcularTotal();
}

// Ejecución inicial por seguridad al cargar la página
window.onload = calcularTotal;
</script>

</body>
</html>
